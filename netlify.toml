# Mise en ligne sur Netlify (gratuit) : connecter le dépôt Git, ce fichier est détecté automatiquement.
[build]
  command = "npm run build"
  publish = "dist"

# SPA : les chemins inconnus renvoient vers index.html (utile si tu ajoutes du routage plus tard)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
